[package]
name = "bouchaud-os"
version = "0.1.0"
edition = "2021"
authors = ["Arthur Bouchaud"]
description = "Bouchaud OS - noyau expérimental from scratch en Rust"
license = "MIT OR Apache-2.0"

[dependencies]
# Bootloader expérimental x86_64 utilisé uniquement pour la phase 0.
# Objectif futur : écrire/maîtriser notre propre chaîne de boot.
bootloader = "0.9.31"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
